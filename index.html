<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Font | Font Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Zero Font</h1>
            <p>Type your name below to generate cool, copy-pasteable text!</p>
        </header>

        <main>
            <div class="input-section">
                <input type="text" id="textInput" placeholder="Enter your text here..." autocomplete="off">
    
                <select id="decorationSelect" class="dropdown-select">
                    </select>
    
                <button id="clearBtn" style="margin-top: 10px; cursor: pointer; color: #94a3b8; background: none; border: none; text-decoration: underline;">Clear All</button>
            </div>
            <div class="results-section" id="resultsContainer">
                </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
